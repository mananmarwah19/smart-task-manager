<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo — Premium Task Manager</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="dark-mode">
  <!-- ============  Animated background blobs  ============ -->
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob--1"></span>
    <span class="blob blob--2"></span>
    <span class="blob blob--3"></span>
  </div>

  <!-- ============  Main App Container  ============ -->
  <div id="app-container">

    <!-- ----  Header  ---- -->
    <header class="app-header">
      <div class="header-top">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1 class="brand-title">Todo<span class="brand-dot">.</span></h1>
        </div>

        <div class="header-actions">
          <span class="task-counter">
            <span id="total-count" class="counter-badge">0</span> tasks
          </span>
          <button id="dark-mode-toggle" class="icon-btn" aria-label="Toggle dark/light mode" title="Toggle theme">
            <!-- Sun icon (shown in dark mode) -->
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3
                       7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Search bar -->
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search tasks…"
          autocomplete="off"
        />
      </div>
    </header>

    <!-- ----  Add‑task form  ---- -->
    <form id="add-task-form" class="add-task-form" autocomplete="off">
      <div class="form-row">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs to be done?"
          required
        />
      </div>

      <div class="form-row form-row--meta">
        <div class="select-wrapper">
          <select id="priority-select" class="priority-select">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>

        <input
          type="date"
          id="due-date"
          class="due-date-input"
        />

        <button type="submit" id="add-task-btn" class="add-task-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Add Task</span>
        </button>
      </div>
    </form>

    <!-- ----  Stats bar  ---- -->
    <div class="stats-bar">
      <span class="stat">
        <span class="stat-dot stat-dot--pending"></span>
        <span id="pending-count">0</span> pending
      </span>
      <span class="stat">
        <span class="stat-dot stat-dot--completed"></span>
        <span id="completed-count">0</span> completed
      </span>
    </div>

    <!-- ----  Tabs  ---- -->
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="pending" role="tab" aria-selected="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Pending
      </button>
      <button class="tab" data-tab="completed" role="tab" aria-selected="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Completed
      </button>
    </div>

    <!-- ----  Task lists  ---- -->
    <section class="task-section task-section--pending active" data-section="pending">
      <ul id="pending-tasks-list" class="task-list">
        <!-- Task cards injected by JS -->
      </ul>
      <div class="empty-state" id="pending-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p class="empty-title">No pending tasks</p>
        <p class="empty-subtitle">Add a task above to get started!</p>
      </div>
    </section>

    <section class="task-section task-section--completed" data-section="completed">
      <ul id="completed-tasks-list" class="task-list">
        <!-- Completed task cards injected by JS -->
      </ul>
      <div class="empty-state" id="completed-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <p class="empty-title">No completed tasks yet</p>
        <p class="empty-subtitle">Complete a task and it will appear here.</p>
      </div>

      <button id="clear-completed-btn" class="clear-completed-btn" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4
                   a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear Completed
      </button>
    </section>

    <!-- ----  Footer  ---- -->
    <footer class="app-footer">
      <p>Built with <span class="heart">♥</span> — Todo<span class="brand-dot">.</span> Premium</p>
    </footer>
  </div>

  <!-- ============  Task card template (hidden)  ============ -->
  <template id="task-card-template">
    <li class="task-card">
      <div class="task-card-inner">
        <button class="complete-btn" aria-label="Mark task complete" title="Complete">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>

        <div class="task-body">
          <p class="task-text"></p>
          <div class="task-meta">
            <span class="task-priority"></span>
            <span class="task-due-date"></span>
          </div>
        </div>

        <button class="delete-btn" aria-label="Delete task" title="Delete">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </li>
  </template>

  <!-- Backend script (created by Backend Agent) -->
  <script src="script.js" defer></script>
</body>
</html>
